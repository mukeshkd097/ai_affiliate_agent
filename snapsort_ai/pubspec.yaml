name: snapsort_ai
description: AI-powered screenshot organizer — auto-categorizes screenshots into smart folders.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Database
  sqflite: ^2.3.2
  path: ^1.9.0

  # Photo gallery access
  photo_manager: ^3.3.0

  # OCR / Text Recognition (on-device)
  google_mlkit_text_recognition: ^0.13.0

  # Storage & Preferences
  shared_preferences: ^2.3.1
  path_provider: ^2.1.3

  # UI
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  permission_handler: ^11.3.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
